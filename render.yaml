services:
  - type: web
    name: cad-generator
    env: python
    plan: free            # switch to "starter" (paid) for always-on, no cold-start sleep
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GROQ_API_KEY
        sync: false        # set the actual value in the Render dashboard, never in this file
      - key: PYTHON_VERSION
        value: 3.12.3
    # Free plan has no persistent disk — outputs/ and session history reset on
    # every restart/deploy/cold-start. Uncomment below on a paid plan to keep them:
    # disk:
    #   name: cad-outputs
    #   mountPath: /opt/render/project/src/outputs
    #   sizeGB: 1
