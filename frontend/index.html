<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI CAD Generator</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="top-row">
      <div>
        <h1>CAD Generator</h1>
        <p class="subtitle">Describe your model in plain English</p>
      </div>
      <button type="button" id="mode-toggle" class="btn-ghost" onclick="toggleMode()">⚙ JSON Mode</button>
    </div>

    <!-- TEMPLATE GALLERY -->
    <div class="card" id="template-card">
      <label>Quick start templates</label>
      <div id="template-groups"></div>
    </div>

    <!-- NATURAL LANGUAGE PROMPT -->
    <div class="card" id="prompt-card">
      <label>Describe your model</label>
      <textarea id="prompt" rows="3"
        placeholder="e.g. a box 50mm wide 30mm tall 20mm deep, or a torus 60mm diameter with a 10mm tube"></textarea>

      <div class="row-inline">
        <label class="inline-label">Material</label>
        <select id="material-select"></select>
      </div>

      <button type="button" id="generate-btn" onclick="generate()">Generate Model</button>
    </div>

    <!-- JSON / POWER USER MODE -->
    <div class="card hidden" id="json-card">
      <label>Raw CAD parameters (JSON) — bypasses the language model entirely</label>
      <textarea id="json-input" rows="8" spellcheck="false"
        placeholder='{"shape":"box","width_mm":50,"depth_mm":30,"height_mm":20}'></textarea>
      <button type="button" id="json-generate-btn" onclick="generateManual()">Generate from JSON</button>
    </div>

    <div id="errors" class="errors hidden"></div>

    <div id="viewer-section" class="hidden">
      <model-viewer
        id="viewer"
        camera-controls
        auto-rotate
        shadow-intensity="1"
        exposure="0.8"
        style="width:100%; height:450px; background:#1a1a2e; border-radius:12px;">
      </model-viewer>

      <div class="color-row">
        <span>Color:</span>
        <button type="button" class="color-btn" style="background:#aaaaff" onclick="setColor('#aaaaff', this)"></button>
        <button type="button" class="color-btn" style="background:#ff6644" onclick="setColor('#ff6644', this)"></button>
        <button type="button" class="color-btn" style="background:#44dd88" onclick="setColor('#44dd88', this)"></button>
        <button type="button" class="color-btn" style="background:#ffcc00" onclick="setColor('#ffcc00', this)"></button>
        <button type="button" class="color-btn" style="background:#000000" onclick="setColor('#000000', this)"></button>
        <input type="color" id="custom-color" onchange="setColor(this.value)"
          style="width:32px;height:32px;border:none;border-radius:6px;cursor:pointer;">
        <span style="margin-left:12px">Material finish:</span>
        <button type="button" class="mat-btn" onclick="setMaterial(0.8, 0.2, this)">Plastic</button>
        <button type="button" class="mat-btn" onclick="setMaterial(1.0, 0.1, this)">Metal</button>
        <button type="button" class="mat-btn" onclick="setMaterial(0.0, 0.8, this)">Rubber</button>
        <button type="button" class="mat-btn" onclick="setMaterial(0.5, 0.5, this)">Matte</button>
      </div>

      <!-- UNDO / REDO -->
      <div class="history-row">
        <button type="button" id="undo-btn" class="btn-ghost" onclick="doUndo()" disabled>↶ Undo</button>
        <button type="button" id="redo-btn" class="btn-ghost" onclick="doRedo()" disabled>↷ Redo</button>
        <span id="history-count" class="history-count"></span>
      </div>

      <!-- PROPERTIES PANEL -->
      <div id="properties-panel" class="properties"></div>

      <div class="download-row">
        <a id="dl-glb" class="btn-download" download="model.glb">⬇ GLB</a>
        <a id="dl-stl" class="btn-download secondary" download="model.stl">⬇ STL</a>
        <a id="dl-step" class="btn-download secondary" download="model.step">⬇ STEP</a>
      </div>
    </div>

    <div id="params-box" class="params hidden"></div>

    <div id="edit-section" class="card hidden">
      <label>Edit your model</label>
      <textarea id="edit-prompt" rows="2"
        placeholder="e.g. make it 10mm taller, add a 4mm bolt circle of 6 holes, remove the hole"></textarea>
      <button type="button" id="edit-btn" onclick="editModel()">Apply Edit</button>
    </div>

  </div>

  <script src="app.js?v=4"></script>

</body>
</html>
